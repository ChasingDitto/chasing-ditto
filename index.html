<!DOCTYPE html>
<html>
<head>
  <title>Chasing Ditto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding: 30px;
    }

    .card {
      max-width: 500px;
      margin: auto;
      background: #222;
      border-radius: 20px;
      padding: 25px;
    }

    h1 {
      color: #ff7de9;
      font-size: 34px;
    }

    .name {
      font-size: 28px;
      font-weight: bold;
      margin: 18px 0;
    }

    .price {
      font-size: 42px;
      font-weight: bold;
      margin: 20px 0;
    }

    .detail {
      font-size: 18px;
      margin: 9px 0;
    }

    .label {
      opacity: 0.7;
      font-size: 14px;
    }

    input,
    button {
      box-sizing: border-box;
      width: 100%;
      font-size: 20px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      margin-top: 10px;
    }

    button {
      background: #ff7de9;
      color: #111;
      font-weight: bold;
      cursor: pointer;
    }

    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .sale-box {
      margin-top: 24px;
      padding: 18px;
      background: #181818;
      border-radius: 14px;
    }

    .sale-button {
      background: #62d98b;
    }

    .status {
      margin-top: 20px;
      opacity: 0.85;
    }

    .message {
      margin-top: 15px;
      font-weight: bold;
    }

    .success {
      color: #62d98b;
    }

    .error {
      color: #ff7777;
    }

    .sold-banner {
      margin-top: 24px;
      padding: 18px;
      border-radius: 12px;
      background: #62d98b;
      color: #111;
      font-size: 26px;
      font-weight: bold;
    }
  </style>
</head>

<body>
  <div class="card" id="card">
    <h1>🟣 Chasing Ditto</h1>
    <div class="detail">Loading card...</div>
  </div>

<script>
  const DEALER_PIN = "1234";

  const csvUrl =
    "https://docs.google.com/spreadsheets/d/e/2PACX-1vTpa9RpRgfWNG_NMtNUXOm44rgm2uiGKojCKMtI8ZM0sIA06otvvWuadd7QnlqzeCLeZ-nxfq81Sb0I/pub?gid=629495162&single=true&output=csv";

  const saleApiUrl =
    "https://script.google.com/macros/s/AKfycbyzdiRPRX_96FCdJT1Z0utx3NbPPG-dWfXH49zfvXj1hJpajJVnJX0Ye_2Wquz3okyT/exec";

  function getParam(name) {
    return new URLSearchParams(window.location.search).get(name);
  }

  function parseCSV(text) {
    const rows = [];
    let row = [];
    let cell = "";
    let insideQuotes = false;

    for (let i = 0; i < text.length; i++) {
      const char = text[i];

      if (char === '"') {
        if (insideQuotes && text[i + 1] === '"') {
          cell += '"';
          i++;
        } else {
          insideQuotes = !insideQuotes;
        }
      } else if (char === "," && !insideQuotes) {
        row.push(cell);
        cell = "";
      } else if ((char === "\n" || char === "\r") && !insideQuotes) {
        if (cell || row.length) {
          row.push(cell);
          rows.push(row);
          row = [];
          cell = "";
        }
      } else {
        cell += char;
      }
    }

    if (cell || row.length) {
      row.push(cell);
      rows.push(row);
    }

    return rows;
  }

  function col(headers, names) {
    for (const name of names) {
      const index = headers.indexOf(name);
      if (index !== -1) return index;
    }

    return -1;
  }

  function val(row, index) {
    return index !== -1 ? row[index] || "" : "";
  }

  function numericPrice(value) {
    const number = Number(
      (value || "").toString().replace(/[^0-9.]/g, "")
    );

    return Number.isFinite(number) ? number : 0;
  }

  function formatPrice(value) {
    const number = Number(value);

    if (!Number.isFinite(number) || number <= 0) {
      return "Ask";
    }

    return "$" + number.toLocaleString("en-US", {
      minimumFractionDigits: 2,
      maximumFractionDigits: 2
    });
  }

  function escapeHtml(value) {
    return String(value || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  function showPinScreen(cardData) {
    document.getElementById("card").innerHTML = `
      <h1>🟣 Chasing Ditto</h1>
      <div class="detail">Dealer Mode</div>

      <input
        id="pin"
        type="password"
        inputmode="numeric"
        placeholder="Enter PIN"
      >

      <button onclick="checkPin()">Unlock</button>

      <div class="status">Denver Show Mode</div>
    `;

    window.currentCardData = cardData;

    const pinInput = document.getElementById("pin");

    pinInput.addEventListener("keydown", event => {
      if (event.key === "Enter") {
        checkPin();
      }
    });

    pinInput.focus();
  }

  function checkPin() {
    const entered = document.getElementById("pin").value;

    if (entered === DEALER_PIN) {
      renderDealerCard(window.currentCardData);
    } else {
      alert("Incorrect PIN");
    }
  }

  function renderDealerCard(data) {
    const row = data.row;
    const h = data.headers;

    const dittoId = val(row, col(h, ["Ditto ID"]));
    const category = val(row, col(h, ["Category", "Product Type"]));
    const set = val(row, col(h, ["Set"]));
    const name = val(row, col(h, ["Product Name", "Name"]));
    const number = val(row, col(h, ["Card Number", "Number"]));
    const rarity = val(row, col(h, ["Rarity"]));
    const variance = val(row, col(h, ["Variance", "Variant"]));
    const gradeRaw = val(row, col(h, ["Grade"]));
    const conditionRaw = val(row, col(h, ["Card Condition", "Condition"]));
    const quantity = val(row, col(h, ["Quantity"]));
    const location = val(row, col(h, ["Location"]));
    const notes = val(row, col(h, ["Notes"]));
    const status = val(row, col(h, ["Status"])) || "Unknown";

    const market = val(row, col(h, ["Market Price"]));
    const display = val(row, col(h, ["Display Price"]));

    const marketNum = numericPrice(market);
    const displayNum = numericPrice(display);
    const bestPrice = Math.max(marketNum, displayNum);

    const conditionMap = {
      "Near Mint": "NM",
      "Lightly Played": "LP",
      "Moderately Played": "MP",
      "Heavily Played": "HP",
      "Damaged": "DMG"
    };

    const grade =
      gradeRaw && gradeRaw !== "Ungraded"
        ? gradeRaw
        : "";

    const condition =
      conditionMap[conditionRaw] || conditionRaw;

    const gradeOrCondition = grade || condition;

    window.currentSale = {
      dittoId,
      name,
      bestPrice
    };

    const alreadySold = status.toLowerCase() === "sold";

    document.getElementById("card").innerHTML = `
      <h1>🟣 Chasing Ditto</h1>

      <div class="name">${escapeHtml(name || "Unnamed Card")}</div>
      <div class="price">${formatPrice(bestPrice)}</div>

      <div class="detail">
        <span class="label">Ditto ID:</span>
        ${escapeHtml(dittoId)}
      </div>

      <div class="detail">
        <span class="label">Category:</span>
        ${escapeHtml(category)}
      </div>

      <div class="detail">
        <span class="label">Set:</span>
        ${escapeHtml(set)}
      </div>

      <div class="detail">
        <span class="label">Card Number:</span>
        ${escapeHtml(number)}
      </div>

      <div class="detail">
        <span class="label">Rarity:</span>
        ${escapeHtml(rarity)}
      </div>

      <div class="detail">
        <span class="label">Variance:</span>
        ${escapeHtml(variance)}
      </div>

      <div class="detail">
        <span class="label">Grade / Condition:</span>
        ${escapeHtml(gradeOrCondition)}
      </div>

      <div class="detail">
        <span class="label">Quantity:</span>
        ${escapeHtml(quantity || "1")}
      </div>

      <div class="detail">
        <span class="label">Location:</span>
        ${escapeHtml(location)}
      </div>

      <div class="detail">
        <span class="label">Notes:</span>
        ${escapeHtml(notes)}
      </div>

      <div class="status" id="cardStatus">${escapeHtml(status)}</div>

      ${
        alreadySold
          ? `
            <div class="sold-banner">
              ✅ SOLD
            </div>
          `
          : `
            <div class="sale-box" id="saleBox">
              <div class="detail">
                <strong>Complete Sale</strong>
              </div>

              <input
                id="soldPrice"
                type="number"
                inputmode="decimal"
                min="0.01"
                step="0.01"
                value="${bestPrice > 0 ? bestPrice.toFixed(2) : ""}"
                placeholder="Enter sold price"
              >

              <button
                id="completeSaleButton"
                class="sale-button"
                onclick="completeSale()"
              >
                💰 Complete Sale
              </button>

              <div id="saleMessage" class="message"></div>
            </div>
          `
      }
    `;
  }

  async function completeSale() {
    const sale = window.currentSale;
    const priceInput = document.getElementById("soldPrice");
    const button = document.getElementById("completeSaleButton");
    const message = document.getElementById("saleMessage");

    const soldPrice = Number(priceInput.value);

    if (!sale || !sale.dittoId) {
      message.className = "message error";
      message.textContent = "Missing Ditto ID.";
      return;
    }

    if (!Number.isFinite(soldPrice) || soldPrice <= 0) {
      message.className = "message error";
      message.textContent = "Please enter a valid sold price.";
      return;
    }

    const confirmed = confirm(
      `Complete sale?\n\n${sale.name}\n${sale.dittoId}\nSold Price: ${formatPrice(soldPrice)}`
    );

    if (!confirmed) return;

    button.disabled = true;
    priceInput.disabled = true;

    message.className = "message";
    message.textContent = "Completing sale...";

    try {
      const response = await fetch(saleApiUrl, {
        method: "POST",

        // text/plain avoids an unnecessary browser preflight request.
        headers: {
          "Content-Type": "text/plain;charset=utf-8"
        },

        body: JSON.stringify({
          action: "completeSale",
          dittoId: sale.dittoId,
          soldPrice: soldPrice
        })
      });

      const result = await response.json();

      if (!result.success) {
        throw new Error(result.message || "Sale could not be completed.");
      }

      document.getElementById("cardStatus").textContent = "Sold";

      document.getElementById("saleBox").innerHTML = `
        <div class="sold-banner">
          ✅ SOLD
        </div>

        <div class="detail">
          ${escapeHtml(result.cardName || sale.name)}
        </div>

        <div class="detail">
          Sold for ${formatPrice(result.soldPrice || soldPrice)}
        </div>
      `;

    } catch (error) {
      button.disabled = false;
      priceInput.disabled = false;

      message.className = "message error";
      message.textContent =
        error && error.message
          ? error.message
          : "The sale could not be completed.";
    }
  }

  function loadCard() {
    fetch(csvUrl)
      .then(response => {
        if (!response.ok) {
          throw new Error("Inventory could not be loaded.");
        }

        return response.text();
      })
      .then(text => {
        const rows = parseCSV(text);
        const headers = rows[0];

        const idCol = headers.indexOf("Ditto ID");
        const id = getParam("id");

        const row = rows
          .slice(1)
          .find(candidate => candidate[idCol] === id);

        if (!row) {
          document.getElementById("card").innerHTML = `
            <h1>🟣 Chasing Ditto</h1>
            <div class="detail"><strong>Card not found.</strong></div>
            <div class="detail">${escapeHtml(id)}</div>
          `;

          return;
        }

        showPinScreen({ row, headers });
      })
      .catch(error => {
        document.getElementById("card").innerHTML = `
          <h1>🟣 Chasing Ditto</h1>
          <div class="detail"><strong>Error loading card.</strong></div>
          <div class="detail">${escapeHtml(error.message || error)}</div>
        `;
      });
  }

  loadCard();
</script>

</body>
</html>
