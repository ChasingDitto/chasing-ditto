<!DOCTYPE html>
<html>
<head>
  <title>Chasing Ditto</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
      padding: 30px;
    }
    .card {
      max-width: 450px;
      margin: auto;
      background: #222;
      border-radius: 20px;
      padding: 25px;
    }
    h1 {
      color: #ff7de9;
      font-size: 34px;
    }
    .title {
      font-size: 28px;
      font-weight: bold;
      margin: 20px 0;
    }
    .price {
      font-size: 44px;
      font-weight: bold;
      margin: 24px 0;
    }
    .detail {
      font-size: 18px;
      margin: 10px 0;
    }
    .status {
      margin-top: 20px;
      opacity: .85;
    }
  </style>
</head>

<body>
  <div class="card" id="card">
    <h1>🟣 Chasing Ditto</h1>
    <div class="detail">Loading card...</div>
  </div>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vTpa9RpRgfWNG_NMtNUXOm44rgm2uiGKojCKMtI8ZM0sIA06otvvWuadd7QnlqzeCLeZ-nxfq81Sb0I/pub?gid=629495162&single=true&output=csv";
function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function parseCSV(text) {
  const rows = [];
  let row = [];
  let cell = "";
  let insideQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const char = text[i];
    const next = text[i + 1];

    if (char === '"' && insideQuotes && next === '"') {
      cell += '"';
      i++;
    } else if (char === '"') {
      insideQuotes = !insideQuotes;
    } else if (char === "," && !insideQuotes) {
      row.push(cell);
      cell = "";
    } else if ((char === "\n" || char === "\r") && !insideQuotes) {
      if (cell || row.length) {
        row.push(cell);
        rows.push(row);
        row = [];
        cell = "";
      }
    } else {
      cell += char;
    }
  }

  if (cell || row.length) {
    row.push(cell);
    rows.push(row);
  }

  return rows;
}

async function loadCard() {
  const id = getParam("id");
  const box = document.getElementById("card");

  if (!id) {
    box.innerHTML = `
      <h1>🟣 Chasing Ditto</h1>
      <div class="detail">No Ditto ID provided.</div>
    `;
    return;
  }

 fetch(csvUrl)
  .then(response => response.text())
  .then(text => {
    const rows = parseCSV(text);
    const headers = rows[0];

    const idCol = headers.indexOf("Ditto ID");
    const nameCol = headers.indexOf("Name");
    const setCol = headers.indexOf("Set");
    const conditionCol = headers.indexOf("Condition");
    const gradeCol = headers.indexOf("Grade");
    const gradingCompanyCol = headers.indexOf("Grading Company");
    const marketCol = headers.indexOf("Market Price");
    const displayCol = headers.indexOf("Display Price");
    const statusCol = headers.indexOf("Status");

    const id = getParam("id");
    const card = rows.slice(1).find(row => row[idCol] === id);

    if (!card) {
      document.getElementById("card").innerHTML = `
        <h1>🟣 Chasing Ditto</h1>
        <div class="detail"><strong>Card not found.</strong></div>
        <div class="detail">${id}</div>
      `;
      return;
    }

    const price = card[displayCol] || card[marketCol] || "Ask";
    const status = card[statusCol] || "Unknown";

    document.getElementById("card").innerHTML = `
      <h1>🟣 Chasing Ditto</h1>
      <div class="name">${card[nameCol] || "Unnamed Card"}</div>
      <div class="detail">${card[setCol] || ""}</div>
      <div class="detail">${card[conditionCol] || ""}</div>
      <div class="price">$${price}</div>
      <div class="status">${status}</div>
    `;
  })
  .catch(error => {
    document.getElementById("card").innerHTML = `
      <h1>🟣 Chasing Ditto</h1>
      <div class="detail"><strong>Error loading card.</strong></div>
      <div class="detail">${error}</div>
    `;
  });

  const condition =
    card[gradeCol] && card[gradeCol] !== "Ungraded"
      ? card[gradeCol]
      : card[conditionCol];

  box.innerHTML = `
    <h1>🟣 Chasing Ditto</h1>
    <div class="title">${card[nameCol]}</div>
    <div class="detail">${card[setCol]} ${card[numberCol] || ""}</div>
    <div class="detail">Condition: ${condition}</div>
    <div class="price">$${card[priceCol]}</div>
    <div class="status">${card[statusCol]}</div>
  `;
}

loadCard();
</script>

</body>
</html>
